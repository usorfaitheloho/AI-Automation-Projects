<svg width="680" height="260" viewBox="0 0 680 260" xmlns="http://www.w3.org/2000/svg" role="img">
<title>Email redirection workflow diagram</title>
<desc>Four stage flow: email intake, AI classification, department routing, and delivery with notification</desc>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#5F5E5A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>
<rect width="680" height="260" fill="#1b1b1a"/>

<rect x="20" y="20" width="150" height="150" rx="14" fill="#412402" stroke="#854F0B" stroke-width="0.5"/>
<text x="36" y="42" font-family="Arial, sans-serif" font-size="14" font-weight="600" fill="#FAC775">Email intake</text>
<rect x="36" y="60" width="118" height="40" rx="8" fill="#633806" stroke="#854F0B" stroke-width="0.5"/>
<text x="95" y="84" font-family="Arial, sans-serif" font-size="12" fill="#FAEEDA" text-anchor="middle">Gmail Trigger</text>
<rect x="36" y="112" width="118" height="40" rx="8" fill="#633806" stroke="#854F0B" stroke-width="0.5"/>
<text x="95" y="136" font-family="Arial, sans-serif" font-size="12" fill="#FAEEDA" text-anchor="middle">Clean data</text>

<line x1="170" y1="95" x2="198" y2="95" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>

<rect x="198" y="20" width="150" height="150" rx="14" fill="#26215C" stroke="#534AB7" stroke-width="0.5"/>
<text x="214" y="42" font-family="Arial, sans-serif" font-size="14" font-weight="600" fill="#CECBF6">AI classification</text>
<rect x="214" y="60" width="118" height="40" rx="8" fill="#3C3489" stroke="#534AB7" stroke-width="0.5"/>
<text x="273" y="84" font-family="Arial, sans-serif" font-size="12" fill="#EEEDFE" text-anchor="middle">Classifier agent</text>
<rect x="214" y="112" width="118" height="40" rx="8" fill="#3C3489" stroke="#534AB7" stroke-width="0.5"/>
<text x="273" y="136" font-family="Arial, sans-serif" font-size="12" fill="#EEEDFE" text-anchor="middle">JSON parser</text>

<line x1="348" y1="95" x2="376" y2="95" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>

<rect x="376" y="20" width="130" height="150" rx="14" fill="#4A1B0C" stroke="#993C1D" stroke-width="0.5"/>
<text x="392" y="42" font-family="Arial, sans-serif" font-size="14" font-weight="600" fill="#F5C4B3">Routing</text>
<rect x="392" y="80" width="98" height="50" rx="8" fill="#712B13" stroke="#993C1D" stroke-width="0.5"/>
<text x="441" y="100" font-family="Arial, sans-serif" font-size="12" fill="#FAECE7" text-anchor="middle">Department</text>
<text x="441" y="116" font-family="Arial, sans-serif" font-size="12" fill="#FAECE7" text-anchor="middle">router</text>

<line x1="506" y1="95" x2="534" y2="95" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>

<rect x="534" y="20" width="126" height="150" rx="14" fill="#173404" stroke="#3B6D11" stroke-width="0.5"/>
<text x="550" y="42" font-family="Arial, sans-serif" font-size="14" font-weight="600" fill="#C0DD97">Delivery</text>
<rect x="550" y="60" width="94" height="40" rx="8" fill="#27500A" stroke="#3B6D11" stroke-width="0.5"/>
<text x="597" y="84" font-family="Arial, sans-serif" font-size="12" fill="#EAF3DE" text-anchor="middle">Forward email</text>
<rect x="550" y="112" width="94" height="40" rx="8" fill="#27500A" stroke="#3B6D11" stroke-width="0.5"/>
<text x="597" y="136" font-family="Arial, sans-serif" font-size="12" fill="#EAF3DE" text-anchor="middle">Slack alert</text>

<text x="340" y="200" font-family="Arial, sans-serif" font-size="12" fill="#B4B2A9" text-anchor="middle">Department: Technical, HR, Marketing, or Finance</text>
</svg>
